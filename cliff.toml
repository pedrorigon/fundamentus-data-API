# git-cliff configuration — https://git-cliff.org/docs/configuration
# CHANGELOG.md is generated from conventional commit messages; do not edit it by hand.

[changelog]
header = """# Changelog

All notable changes to this project are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/), and this project follows [Semantic Versioning](https://semver.org/spec/v2.0.0.html)."""
body = """
{%- if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else %}
## [Unreleased]
{%- endif %}
{%- set internal = commits | filter(attribute="group", value="Internal") | length %}
{%- if internal == commits | length %}

No user-facing changes.
{%- endif %}
{%- for group, commits in commits | group_by(attribute="group") %}
{%- if group != "Internal" %}

### {{ group }}
{% for commit in commits %}
- {% if commit.breaking %}**Breaking:** {% endif %}{{ commit.message | upper_first }}.
{%- endfor %}
{%- endif %}
{%- endfor %}
"""
footer = """
{%- for release in releases %}
{%- if release.version %}
{%- if release.previous.version %}
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/pedrorigon/fundamentus-data-API/compare/{{ release.previous.version }}...{{ release.version }}
{%- else %}
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/pedrorigon/fundamentus-data-API/releases/tag/{{ release.version }}
{%- endif %}
{%- else %}
[Unreleased]: https://github.com/pedrorigon/fundamentus-data-API/compare/{{ release.previous.version }}...HEAD
{%- endif %}
{%- endfor %}"""
trim = false
render_always = true

[git]
conventional_commits = true
filter_unconventional = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+"
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Changed" },
  { message = "^refactor", group = "Changed" },
  { message = "^revert", group = "Changed" },
  { message = "^docs", group = "Internal" },
  { message = "^style", group = "Internal" },
  { message = "^test", group = "Internal" },
  { message = "^chore", group = "Internal" },
  { message = "^ci", group = "Internal" },
  { message = "^build", group = "Internal" },
  { message = "^Initial commit", group = "Internal" },
  { message = ".*", group = "Changed" },
]
