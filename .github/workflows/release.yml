name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v5

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Inject release version
        run: python scripts/sync_release_version.py "${{ steps.version.outputs.version }}"

      - name: Install dependencies
        run: uv sync --python 3.12 --extra dev

      - name: Validate
        run: |
          uv run ruff format --check .
          uv run ruff check .
          uv run mypy app
          uv run pytest

      - name: Generate release notes
        run: uvx git-cliff@2.13.1 --latest --strip all --output release-notes.md

      - name: Build Python artifacts
        run: uv build

      - name: Build Docker artifact
        run: |
          docker build -t "fundamentus-data-api:${GITHUB_REF_NAME#v}" .
          docker save "fundamentus-data-api:${GITHUB_REF_NAME#v}" \
            -o "dist/fundamentus-data-api-${GITHUB_REF_NAME}.docker.tar"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: dist/*

      - name: Sync changelog to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout -f -B main origin/main
          uvx git-cliff@2.13.1 --output CHANGELOG.md
          if git diff --quiet -- CHANGELOG.md; then
            echo "Changelog on main already covers this release."
            exit 0
          fi
          git add CHANGELOG.md
          git commit -m "docs(changelog): add ${GITHUB_REF_NAME#v} section [skip ci]"
          git push origin main
