name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --python 3.12 --extra dev
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy app
      - run: uv run pytest
